{% extends 'layout/base.html' %}

{% block content %}
<div class="container py-5">
  <div class="card card-custom">
    <div class="row g-0">
      <!--Formulario -->
      <div class="col-lg-6">
        <div class="form-section" style="padding: 2rem;">
          <h2 class="mb-4 text-center">Crea una cuenta</h2>
          <form method="post">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="nombreCompleto" class="form-label">Nombre Completo</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required>
              </div>
              <div class="col-md-6">
                <label for="documento" class="form-label">Documento</label>
                <input type="number" class="form-control" id="documento" name="" required>
              </div>
              <div class="col-md-6">
                <label for="username" class="form-label">Nombre de usuario</label>
                <input type="text" class="form-control" id="username" name="username" required>
              </div>
              <div class="col-md-6">
                <label for="correo" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="correo" name="correo" required>
              </div>
              <div class="col-md-6">
                <label for="celular" class="form-label">Celular</label>
                <input type="tel" class="form-control" id="celular" name="celular" required>
              </div>
              <div class="col-md-6">
                <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
                <input type="date" class="form-control" id="fechaNacimiento" name="fechaNacimiento" min="2007-12-31" required>
              </div>
              <div class="col-md-6">
                <label for="direccion" class="form-label">Dirección</label>
                <input type="text" class="form-control" id="direccion" required>
              </div>
              <div class="col-md-6">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
              </div>
              <div class="col-md-6">
                <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                <input type="password" class="form-control" id="confirmPassword" required>
              </div>
              <div class="col-lg-6">
                <label class="form-label d-block">Seleccione su Género</label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="genero" id="masculino" value="Masculino" required>
                  <label class="form-check-label" for="masculino">Masculino</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="genero" id="femenino" value="Femenino" required>
                  <label class="form-check-label" for="femenino">Femenino</label>
                </div>
              </div>
              <div class="col-12 d-grid">
                <button type="submit" class="btn btn-success">Registrarse</button>
              </div>
              <div class="col-12 text-center">
                <p class="mt-3 mb-0">¿Ya tienes cuenta? <a href="signin" class="text-success fw-bold">Inicia sesión</a></p>
              </div>
            </div>
          </form>
        </div>
      </div>
      <!--Imagen -->
      <div class="col-lg-6">
        <div class="illustration h-100">
          <img src="/static/img/svg/signup.svg">
        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
