{% extends 'layout/base.html' %}

{% block content %}
<div class="container py-5">
  <div class="card card-custom">
    <div class="row g-0">
      <!--Formulario -->
      <div class="col-lg-6">
        <div class="form-section" style="padding: 2rem;">
          <h2 class="mb-4 text-center">Crea una cuenta</h2>
          <form method="post" action="{% url 'signup' %}">
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-md-6">
                <label for="nombreCompleto" class="form-label">Nombre Completo</label>
                <input type="text" class="form-control" placeholder="Ej: Anderson Zapata" id="nombre" name="nombre" required>
              </div>
              <div class="col-md-6">
                <label for="documento" class="form-label">Documento</label>
                <input type="number" class="form-control" placeholder="Ej: 123456789" id="documento" name="documento" required>
              </div>
              <div class="col-md-6">
                <label for="username" class="form-label">Nombre de usuario</label>
                <input type="text" class="form-control" placeholder="Ej: anderson_z" id="nombre_usuario" name="nombre_usuario" required>
              </div>
              <div class="col-md-6">
                <label for="correo" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" placeholder="Ej: anderson@example.com" id="correo" name="correo" required>
              </div>
              <div class="col-md-6">
                <label for="celular" class="form-label">Celular</label>
                <input type="tel" class="form-control" placeholder="Ej: 3001234567" id="celular" name="celular" required>
              </div>
              <div class="col-md-6">
                <label for="fecha_nacimiento" class="form-label">Fecha de nacimiento</label>
                <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" min="2007-12-31" required>
              </div>
              <div class="col-md-6">
                <label for="direccion" class="form-label">Dirección</label>
                <input type="text" class="form-control" placeholder="Ej: Calle 45 #12-35, Medellín" id="direccion" name="direccion" required>
              </div>
              <div class="col-md-6">
                <label for="contrasena" class="form-label">Contraseña</label>
                <div class="input-group">
                  <input type="password" class="form-control" placeholder="Ej: 4kuBu7uhM3dk1t" id="contrasena" name="contrasena"
                        required autocomplete="new-password">
                  <button type="button" class="btn btn-outline-success toggle-pass"
                          data-target="#contrasena" aria-label="Mostrar u ocultar contraseña">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>
              <div class="col-md-6">
                <label for="confirmar" class="form-label">Confirmar Contraseña</label>
                <div class="input-group">
                  <input type="password" class="form-control" placeholder="ej. 4kuBu7uhM3dk1t" id="confirmar" name="confirmar_contrasena"
                        required autocomplete="new-password">
                  <button type="button" class="btn btn-outline-success toggle-pass"
                          data-target="#confirmar" aria-label="Mostrar u ocultar contraseña">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>
                <div class="col-md-6">
                  <label class="form-label d-block">Seleccione su Género</label>
                  <div class="d-flex gap-4 pt-2">
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="sexo" id="sexoM" value="M" required>
                      <label class="form-check-label" for="sexoM">Masculino</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="sexo" id="sexoF" value="F">
                      <label class="form-check-label" for="sexoF">Femenino</label>
                    </div>
                  </div>
                </div>

                <!-- botón en su propia fila completa -->
                <div class="col-12 d-grid">
                  <button type="submit" class="btn btn-success">Registrarse</button>
                </div>

                <div class="col-12 text-center">
                  <p class="mt-3 mb-0">¿Ya tienes cuenta?
                    <a href="{% url 'signin' %}" class="text-success fw-bold">Inicia sesión</a>
                  </p>
                </div>
              </div>
          </form>
        </div>
      </div>
      <!--Imagen -->
      <div class="col-lg-6">
        <div class="illustration h-100">
          <img src="/static/img/svg/signup.svg">
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.toggle-pass').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.querySelector(btn.dataset.target);
        if (!input) return;
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        const icon = btn.querySelector('i');
        icon.classList.toggle('bi-eye', !show);
        icon.classList.toggle('bi-eye-slash', show);
        btn.setAttribute('aria-pressed', show);
        input.focus({ preventScroll: true });
      });
    });
  });
</script>
{% endblock %}
